databases:
  - name: templpulse-db
    plan: free
    databaseName: templbench
    user: templpulse

services:
  - type: web
    name: templpulse-api
    runtime: docker
    plan: free
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/engines
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: templpulse-db
          property: connectionString

  - type: web
    name: templpulse-web
    runtime: static
    rootDir: apps/web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://templpulse-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
